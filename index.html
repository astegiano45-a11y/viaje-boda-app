<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Franco & Romina - Cancún 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
color:white;
overflow:hidden;
background:black;
}

.video-section{
position:fixed;
width:100%;
height:100vh;
top:0;
left:0;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
transition:opacity 1s ease;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

h1{
font-family:'Playfair Display',serif;
font-size:3rem;
letter-spacing:3px;
}

.sub{
margin-top:15px;
font-size:1.1rem;
letter-spacing:2px;
}

.button{
margin-top:40px;
padding:14px 35px;
border:1px solid rgba(255,255,255,0.6);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
cursor:pointer;
transition:0.3s;
}

.button:hover{
background:rgba(255,255,255,0.3);
}

.hidden{
opacity:0;
pointer-events:none;
}

.menu{
display:flex;
flex-direction:column;
gap:20px;
}

.countdown{
font-size:2rem;
margin-top:20px;
}

.footer{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-size:0.8rem;
opacity:0.7;
}

</style>
</head>

<body>

<!-- BIENVENIDA -->
<section id="welcome" class="video-section">
<video autoplay muted loop playsinline>
<source src="Proyecto de video 1.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div>
<h1>Franco & Romina</h1>
<div class="sub">Cancún · México · Noviembre 2026</div>
<div class="button" onclick="enterApp()">INGRESAR</div>
</div>
</section>

<!-- MENU PRINCIPAL -->
<section id="menu" class="video-section hidden">
<video autoplay muted loop playsinline>
<source src="Proyecto de video 2.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="menu">
<h1>Nuestra Boda en el Caribe</h1>

<div class="button" onclick="showCountdown()">Cuenta Regresiva</div>
<div class="button" onclick="alert('Próximamente cuotas estimadas USD 1700 - 2000')">Ver Cuotas</div>
<div class="button" onclick="window.open('https://photos.google.com','_blank')">Álbum Compartido</div>

</div>
</section>

<!-- CUENTA REGRESIVA -->
<section id="countdownSection" class="video-section hidden">
<video autoplay muted loop playsinline>
<source src="CUENTA REGRSIVA.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div>
<h1>Falta para el gran día</h1>
<div class="countdown" id="countdown"></div>
<div class="button" onclick="backToMenu()">Volver</div>
</div>
</section>

<script>

const weddingDate = new Date("2026-11-15");

function enterApp(){
document.getElementById("welcome").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

function showCountdown(){
document.getElementById("menu").classList.add("hidden");
document.getElementById("countdownSection").classList.remove("hidden");
}

function backToMenu(){
document.getElementById("countdownSection").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

function updateCountdown(){
const now = new Date();
const diff = weddingDate - now;

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff / (1000*60*60)) % 24);
const minutes = Math.floor((diff / (1000*60)) % 60);
const seconds = Math.floor((diff / 1000) % 60);

document.getElementById("countdown").innerHTML =
`${days} días · ${hours}h · ${minutes}m · ${seconds}s`;

}

setInterval(updateCountdown,1000);

</script>

</body>
</html>
